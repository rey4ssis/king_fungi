<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Análise de Genoma</title>
  <!-- Incluir os links para os arquivos CSS do Bootstrap -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    header{
      background-image: url('img/topo.png'); /* Caminho para a imagem de fundo */
      background-size: cover; /* Ajusta o tamanho da imagem para cobrir o container */
      background-position: center; /* Centraliza a imagem no container */
      background-repeat: no-repeat; /* Impede a repetição da imagem de fundo */
      background-position-y: center; /* Centraliza a imagem no container */
      color: #343a40; /* Cor do texto */
        
      text-align: center; /* Alinhamento do texto */
    }
  </style>

</head>
<body>

<!-- Cabeçalho -->
<header class="text-white text-center py-4" >
    <div class="container">
      <div class="row align-items-center">
        <div class="col-2">
          <img src="img/logo.png" alt="Símbolo da Empresa" width="100">
        </div>
        <div class="col-10">
          <h1>KingFungi</h1>
        </div>
      </div>
    </div>
  </header>

<div class="container mt-4">
  <div class="row">
    <!-- Painel de Status -->
    <div class="col-md-4">
        <h4>Status do Processo</h4>
        <ul class="list-group">
            <a href="#" class="text-dark"><li class="list-group-item"><i class="fas fa-dna"></i> Solicitar Análise de Genoma</li></a>
            <a href="processamento.html" class="text-dark"><li class="list-group-item"><i class="fas fa-cog fa-spin"></i> Análise em Processamento</li></a>
            <a href="concluida.html" class="text-dark"><li class="list-group-item"><i class="fas fa-check-circle"></i> Análise Concluída</li></a>
        </ul>
      </div>
      
    <!-- Formulário de Submissão -->
    <div class="col-md-8">
      <h4>Submeter Sequência de Dados Genéticos</h4>
      <form>
        <div class="form-group">
          <label for="genomicData">Sequência Genética:</label>
          <textarea class="form-control" id="genomicData" rows="5"></textarea>
        </div>
        <button type="submit" class="btn btn-primary float-right">Submeter</button>
      </form>
    </div>
  </div>
</div>

<!-- Incluir os scripts JavaScript do Bootstrap -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
